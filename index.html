<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>イロノアマオト</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #fff;
    font-family: "Helvetica Neue", "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
    color: #b8bdc4;
  }

  canvas {
    display: block;
    background: #fff;
  }

  .title {
    position: fixed;
    top: 28px;
    left: 32px;
    letter-spacing: 0.16em;
    font-size: 18px;
    font-weight: 300;
    color: #aeb6bf;
    z-index: 10;
  }

  .subtitle {
    position: fixed;
    top: 58px;
    left: 34px;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: #d0d5da;
    z-index: 10;
  }

  .hint {
    position: fixed;
    top: 92px;
    left: 34px;
    color: #c8cdd3;
    font-size: 12px;
    line-height: 1.9;
    letter-spacing: 0.04em;
    pointer-events: none;
    z-index: 10;
  }

  .ui {
    position: fixed;
    bottom: 26px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 11px;
    align-items: center;
    background: rgba(255,255,255,0.78);
    padding: 13px 17px;
    border-radius: 999px;
    backdrop-filter: blur(20px);
    border: 1px solid rgba(225,232,238,0.8);
    box-shadow: 0 18px 45px rgba(150,165,180,0.13);
    z-index: 10;
  }

  .ui::before {
    content: "";
    position: absolute;
    inset: -1px;
    border-radius: 999px;
    padding: 1px;
    background: linear-gradient(
      90deg,
      rgba(255,135,135,0.26),
      rgba(255,230,128,0.23),
      rgba(145,230,163,0.22),
      rgba(142,216,255,0.24),
      rgba(188,167,255,0.23),
      rgba(255,179,207,0.22)
    );
    -webkit-mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }

  button {
    position: relative;
    border: 1px solid rgba(225,230,236,0.9);
    background: rgba(255,255,255,0.78);
    color: #aeb5bd;
    border-radius: 999px;
    padding: 9px 14px;
    cursor: pointer;
    font-size: 12px;
    letter-spacing: 0.05em;
  }

  button:hover {
    transform: translateY(-2px);
    background: rgba(255,255,255,0.95);
    color: #8f98a3;
  }

  .color {
    width: 40px;
    height: 40px;
    padding: 0;
    border-radius: 50%;
    color: rgba(255,255,255,0.94);
    font-size: 11px;
    font-weight: 500;
    text-shadow: 0 1px 5px rgba(70,80,90,0.25);
    overflow: hidden;
  }

  .color::after {
    content: "";
    position: absolute;
    inset: 4px 7px auto 7px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255,255,255,0.38);
    filter: blur(1px);
  }

  .selected {
    outline: 3px solid rgba(190,202,214,0.36);
    transform: translateY(-3px);
    box-shadow:
      0 10px 28px rgba(160,170,180,0.18),
      0 0 0 6px rgba(255,255,255,0.72);
  }
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<div class="title">イロノアマオト</div>
<div class="subtitle">before the rainbow appears</div>

<div class="hint">
  ドラッグ：インクと持続音<br>
  A〜K：音階演奏<br>
  Random：ランダム色<br>
  Chord：クリックごとに色と和音
</div>

<div class="ui" id="buttons"></div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let w, h;

function resize() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}

resize();
window.addEventListener("resize", resize);

const notes = [
  { name: "ド", key: "a", color: "#ff7b7b", freq: 261.63 },
  { name: "レ", key: "s", color: "#ffe680", freq: 293.66 },
  { name: "ミ", key: "d", color: "#91e6a3", freq: 329.63 },
  { name: "ファ", key: "f", color: "#ffb36b", freq: 349.23 },
  { name: "ソ", key: "g", color: "#8ed8ff", freq: 392.00 },
  { name: "ラ", key: "h", color: "#bca7ff", freq: 440.00 },
  { name: "シ", key: "j", color: "#ffb3cf", freq: 493.88 },
  { name: "高ド", key: "k", color: "#ff8f8f", freq: 523.25 }
];

let current = notes[0];
let inks = [];
let isDrawing = false;
let mode = "normal";
let washing = false;
let washPower = 0;

const buttons = document.getElementById("buttons");

notes.forEach(note => {
  const btn = document.createElement("button");
  btn.className = "color";
  btn.textContent = note.key.toUpperCase();
  btn.title = `${note.name} / ${note.key.toUpperCase()}`;
  btn.style.background = note.color;

  btn.onclick = () => {
    mode = "normal";
    current = note;
    updateSelected();
    playTap(note);
  };

  buttons.appendChild(btn);
  note.button = btn;
});

const randomBtn = document.createElement("button");
randomBtn.textContent = "Random";
randomBtn.onclick = () => {
  mode = "random";
  current = randomNote();
  updateSelected();
};
buttons.appendChild(randomBtn);

const chordBtn = document.createElement("button");
chordBtn.textContent = "Chord";
chordBtn.onclick = () => {
  mode = "chord";
  current = randomNote();
  updateSelected();
};
buttons.appendChild(chordBtn);

const clearBtn = document.createElement("button");
clearBtn.textContent = "Clear";
clearBtn.onclick = () => {
  washing = true;
  washPower = 1;
  stopSustain();
};
buttons.appendChild(clearBtn);

function updateSelected() {
  notes.forEach(n => n.button.classList.remove("selected"));
  current.button.classList.add("selected");
}

function randomNote() {
  return notes[Math.floor(Math.random() * notes.length)];
}

updateSelected();

/* ---------- Audio ---------- */
let audioCtx;
let sustainSound = null;
let oldSounds = [];

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function createSoftGlass(freq, volume = 0.12) {
  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();

  osc1.type = "sine";
  osc2.type = "sine";

  osc1.frequency.value = freq;
  osc2.frequency.value = freq * 2.01;

  filter.type = "lowpass";
  filter.frequency.value = 1700;
  filter.Q.value = 2;

  gain.gain.value = 0.0001;

  osc1.connect(filter);
  osc2.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);

  osc1.start();
  osc2.start();

  return { osc1, osc2, gain, filter, volume };
}

function playTap(note) {
  initAudio();

  const freqs = mode === "chord"
    ? [note.freq, note.freq * 1.25, note.freq * 1.5]
    : [note.freq];

  const vol = mode === "chord" ? 0.04 : 0.12;
  const dur = mode === "chord" ? 2.2 : 1.5;

  freqs.forEach(freq => {
    const v = createSoftGlass(freq, vol);
    v.gain.gain.exponentialRampToValueAtTime(vol, audioCtx.currentTime + 0.06);
    v.gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);

    v.osc1.stop(audioCtx.currentTime + dur + 0.1);
    v.osc2.stop(audioCtx.currentTime + dur + 0.1);

    oldSounds.push(v);
  });

  fadeOldSounds();
}

function startSustain(note) {
  initAudio();
  stopSustain();

  const freqs = mode === "chord"
    ? [note.freq, note.freq * 1.25, note.freq * 1.5]
    : [note.freq];

  const vol = mode === "chord" ? 0.032 : 0.11;

  sustainSound = freqs.map(freq => {
    const v = createSoftGlass(freq, vol);
    v.gain.gain.exponentialRampToValueAtTime(vol, audioCtx.currentTime + 0.18);
    return v;
  });

  fadeOldSounds();
}

function stopSustain() {
  if (!sustainSound || !audioCtx) return;

  sustainSound.forEach(v => {
    v.gain.gain.cancelScheduledValues(audioCtx.currentTime);
    v.gain.gain.setValueAtTime(v.gain.gain.value, audioCtx.currentTime);
    v.gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 1.1);

    v.osc1.stop(audioCtx.currentTime + 1.25);
    v.osc2.stop(audioCtx.currentTime + 1.25);
  });

  sustainSound = null;
}

function fadeOldSounds() {
  while (oldSounds.length > 4) {
    const old = oldSounds.shift();
    old.gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
  }
}

/* ---------- Ink ---------- */
function addInk(x, y, color) {
  const count = mode === "chord" ? 5 : 7;

  for (let i = 0; i < count; i++) {
    inks.push({
      x,
      y,
      vx: (Math.random() - 0.5) * 0.38,
      vy: (Math.random() - 0.5) * 0.38,
      r: Math.random() * 8 + 6,
      maxR: Math.random() * 120 + 80,
      color,
      alpha: 0.115,
      life: 1,
      angle: Math.random() * Math.PI * 2,
      twist: Math.random() * 0.025 + 0.006,
      oil: Math.random() * 0.8 + 0.4
    });
  }
}

function drawInk() {
  ctx.clearRect(0, 0, w, h);

  inks.forEach((ink, index) => {
    if (washing) {
      ink.x += 8 * washPower + Math.sin(ink.y * 0.02) * 2;
      ink.y += Math.sin(ink.x * 0.01) * 0.7;
      ink.life *= 0.965;
    } else {
      ink.angle += ink.twist;
      ink.x += ink.vx + Math.cos(ink.angle) * 0.2;
      ink.y += ink.vy + Math.sin(ink.angle) * 0.2;
      ink.life *= 0.996;
    }

    ink.r += (ink.maxR - ink.r) * 0.01;

    // 本体：前の発色に近い source-over
    ctx.globalCompositeOperation = "source-over";

    const grad = ctx.createRadialGradient(ink.x, ink.y, 0, ink.x, ink.y, ink.r);
    grad.addColorStop(0, rgba(ink.color, ink.alpha * 1.4 * ink.life));
    grad.addColorStop(0.32, rgba(ink.color, ink.alpha * 0.72 * ink.life));
    grad.addColorStop(0.68, rgba(ink.color, ink.alpha * 0.22 * ink.life));
    grad.addColorStop(1, rgba(ink.color, 0));

    ctx.fillStyle = grad;
    ctx.beginPath();

    const points = 48;
    for (let i = 0; i <= points; i++) {
      const a = (Math.PI * 2 * i) / points;
      const oily =
        Math.sin(a * 2 + ink.angle) * 14 * ink.oil +
        Math.sin(a * 5 - ink.angle * 1.3) * 7;

      const rr = ink.r + oily;
      const px = ink.x + Math.cos(a) * rr;
      const py = ink.y + Math.sin(a) * rr * 0.86;

      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    }

    ctx.closePath();
    ctx.fill();

    // 境界：白飛びしない程度の薄い油膜
    ctx.globalCompositeOperation = "screen";
    ctx.strokeStyle = rgba(ink.color, 0.055 * ink.life);
    ctx.lineWidth = 1.2;
    ctx.stroke();

    // 筋：透明感のある流れ
    ctx.globalCompositeOperation = "source-over";
    ctx.strokeStyle = rgba(ink.color, 0.045 * ink.life);
    ctx.lineWidth = 1;

    for (let j = 0; j < 4; j++) {
      const a = ink.angle + j * 1.4;
      ctx.beginPath();
      ctx.moveTo(
        ink.x + Math.cos(a) * ink.r * 0.15,
        ink.y + Math.sin(a) * ink.r * 0.12
      );
      ctx.bezierCurveTo(
        ink.x + Math.cos(a + 0.5) * ink.r * 0.6,
        ink.y + Math.sin(a + 0.5) * ink.r * 0.25,
        ink.x + Math.cos(a + 1.1) * ink.r * 0.75,
        ink.y + Math.sin(a + 1.1) * ink.r * 0.55,
        ink.x + Math.cos(a + 1.7) * ink.r,
        ink.y + Math.sin(a + 1.7) * ink.r * 0.7
      );
      ctx.stroke();
    }

    if (ink.life < 0.035 || ink.x > w + 300) {
      inks.splice(index, 1);
    }
  });

  ctx.globalCompositeOperation = "source-over";

  if (washing) {
    washPower *= 0.94;
    if (washPower < 0.02 || inks.length === 0) {
      washing = false;
      washPower = 0;
      inks = [];
    }
  }

  requestAnimationFrame(drawInk);
}

function rgba(hex, alpha) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

drawInk();

/* ---------- Interaction ---------- */
canvas.addEventListener("pointerdown", e => {
  if (mode === "random" || mode === "chord") {
    current = randomNote();
    updateSelected();
  }

  isDrawing = true;
  addInk(e.clientX, e.clientY, current.color);
  startSustain(current);
});

canvas.addEventListener("pointermove", e => {
  if (!isDrawing) return;
  addInk(e.clientX, e.clientY, current.color);
});

window.addEventListener("pointerup", () => {
  isDrawing = false;
  stopSustain();
});

window.addEventListener("keydown", e => {
  const note = notes.find(n => n.key === e.key.toLowerCase());
  if (!note) return;

  mode = "normal";
  current = note;
  updateSelected();

  playTap(note);
  addInk(Math.random() * w, Math.random() * h, note.color);
});
</script>

</body>
</html>
